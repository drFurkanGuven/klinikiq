version: "3.9"

networks:
  klinikiq_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:15
    container_name: klinikiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: klinikiq
      POSTGRES_PASSWORD: password
      POSTGRES_DB: klinikiq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - klinikiq_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klinikiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: klinikiq_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - klinikiq_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: klinikiq_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./tiles:/tiles
    networks:
      - klinikiq_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: klinikiq_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - klinikiq_net
    depends_on:
      - backend
    command: npm run dev

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: klinikiq_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./tiles:/tiles:ro
    networks:
      - klinikiq_net
    depends_on:
      - backend
      - frontend
